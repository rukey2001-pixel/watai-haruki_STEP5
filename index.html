<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript 課題</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>

<hr>
    <!-- 背景色変更ボタン -->
    <button id="changeBgButton">背景色を変更</button>

    <br><br>

    <!-- テキスト入力欄 -->
    <label for="textInput">テキスト入力欄</label>
    <input type="text" id="textInput"> 

    <!-- 表示ボタン -->
    <button id="displayButton">表示</button>

    <!-- 追加ボタン -->
    <button id="addButton">追加</button>

    <!-- テキスト表示エリア -->
    <h3>表示エリア</h3>
    <div id="displayArea"></div>

    <!-- 行数カウント表示 -->
    <p id="countText">現在の行数: 0件</p>

    <!-- データテーブル -->
    <table border="1">
    <thead>
        <tr>
            <th>内容</th>
            <th>操作</th>
        </tr>
    </thead>

    <tbody id="tableBody">
        <!-- 追加された行はここに入る -->
    </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
